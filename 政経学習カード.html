<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>政治経済 単語カード学習</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;700;900&family=Noto+Sans+JP:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d1117;
    --surface: #161b22;
    --card-bg: #1c2333;
    --border: #30363d;
    --accent: #e8c840;
    --accent2: #4fc3f7;
    --wrong: #f85149;
    --correct: #3fb950;
    --text: #e6edf3;
    --text-muted: #8b949e;
    --text-dim: #484f58;
    --serif: 'Noto Serif JP', serif;
    --sans: 'Noto Sans JP', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, #0d1117 0%, #1a1f2e 50%, #0d1117 100%);
    border-bottom: 1px solid var(--border);
    padding: 24px 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(10px);
  }

  .logo {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    color: var(--accent);
  }

  .logo span { color: var(--text-muted); font-weight: 400; font-size: 0.85rem; display: block; letter-spacing: 0.1em; }

  .score-badge {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 20px;
    font-size: 0.85rem;
    color: var(--text-muted);
    text-align: center;
  }
  .score-badge strong { color: var(--accent); font-size: 1.2rem; font-family: var(--serif); }

  /* TABS */
  .tabs-wrapper {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    overflow-x: auto;
    display: flex;
    gap: 0;
    scrollbar-width: none;
  }
  .tabs-wrapper::-webkit-scrollbar { display: none; }

  .tab {
    padding: 14px 20px;
    font-size: 0.8rem;
    font-family: var(--sans);
    font-weight: 500;
    color: var(--text-muted);
    cursor: pointer;
    border: none;
    background: none;
    border-bottom: 3px solid transparent;
    white-space: nowrap;
    transition: all 0.2s;
    letter-spacing: 0.05em;
  }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab .wrong-dot {
    display: inline-block;
    width: 6px; height: 6px;
    background: var(--wrong);
    border-radius: 50%;
    margin-left: 5px;
    vertical-align: middle;
  }

  /* MAIN LAYOUT */
  .main {
    max-width: 900px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* SECTION HEADER */
  .section-header {
    margin-bottom: 28px;
  }
  .section-title {
    font-family: var(--serif);
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--text);
    margin-bottom: 6px;
  }
  .section-meta {
    font-size: 0.8rem;
    color: var(--text-muted);
    letter-spacing: 0.05em;
  }
  .wrong-count {
    display: inline-block;
    background: rgba(248, 81, 73, 0.15);
    border: 1px solid rgba(248, 81, 73, 0.4);
    color: var(--wrong);
    font-size: 0.75rem;
    padding: 2px 10px;
    border-radius: 20px;
    margin-left: 10px;
    font-weight: 500;
  }

  /* MODE BUTTONS */
  .mode-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }
  .mode-btn {
    padding: 9px 20px;
    border-radius: 6px;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text-muted);
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .mode-btn:hover { border-color: var(--accent); color: var(--accent); }
  .mode-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .mode-btn.danger { border-color: rgba(248,81,73,0.4); color: var(--wrong); }
  .mode-btn.danger:hover { background: rgba(248,81,73,0.15); }

  /* FLASHCARD GRID */
  .cards-grid {
    display: grid;
    gap: 16px;
  }

  /* FLASHCARD */
  .flashcard {
    perspective: 1200px;
    height: 130px;
    cursor: pointer;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }
  .flashcard:nth-child(1) { animation-delay: 0.02s; }
  .flashcard:nth-child(2) { animation-delay: 0.04s; }
  .flashcard:nth-child(3) { animation-delay: 0.06s; }
  .flashcard:nth-child(4) { animation-delay: 0.08s; }
  .flashcard:nth-child(5) { animation-delay: 0.10s; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .flashcard.tall { height: 160px; }

  .card-inner {
    width: 100%;
    height: 100%;
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    transform-style: preserve-3d;
    position: relative;
  }
  .flashcard.flipped .card-inner { transform: rotateY(180deg); }

  .card-face {
    position: absolute;
    width: 100%;
    height: 100%;
    backface-visibility: hidden;
    border-radius: 12px;
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    padding: 20px 24px;
    gap: 16px;
  }
  .card-front {
    background: var(--card-bg);
  }
  .card-back {
    background: linear-gradient(135deg, #1a2332 0%, #1c2b3a 100%);
    border-color: rgba(79, 195, 247, 0.3);
    transform: rotateY(180deg);
  }

  .card-num {
    font-family: var(--serif);
    font-size: 1.6rem;
    font-weight: 900;
    color: var(--text-dim);
    min-width: 36px;
    text-align: center;
    flex-shrink: 0;
  }

  .card-question {
    flex: 1;
    font-size: 0.88rem;
    line-height: 1.65;
    color: var(--text-muted);
  }

  .card-hint {
    font-size: 0.72rem;
    color: var(--text-dim);
    margin-top: 4px;
    font-style: italic;
  }

  .card-answer-wrap {
    flex: 1;
    text-align: center;
  }

  .card-answer {
    font-family: var(--serif);
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--accent2);
    line-height: 1.4;
  }

  .card-answer.small { font-size: 1.05rem; }
  .card-answer.xsmall { font-size: 0.9rem; }

  .card-flip-hint {
    position: absolute;
    bottom: 10px;
    right: 14px;
    font-size: 0.65rem;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  .wrong-badge {
    position: absolute;
    top: 10px;
    right: 14px;
    font-size: 0.65rem;
    background: rgba(248,81,73,0.2);
    color: var(--wrong);
    border: 1px solid rgba(248,81,73,0.35);
    padding: 2px 8px;
    border-radius: 10px;
    letter-spacing: 0.05em;
    font-weight: 600;
  }

  /* QUIZ MODE */
  .quiz-container {
    display: none;
  }
  .quiz-container.active {
    display: block;
  }
  .quiz-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 32px 36px;
    margin-bottom: 20px;
    animation: fadeIn 0.4s ease forwards;
  }
  .quiz-progress {
    font-size: 0.78rem;
    color: var(--text-muted);
    margin-bottom: 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .progress-bar-wrap {
    flex: 1;
    margin: 0 16px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.4s ease;
  }
  .quiz-q-num {
    font-family: var(--serif);
    font-size: 2.5rem;
    font-weight: 900;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  .quiz-question {
    font-size: 1rem;
    line-height: 1.75;
    color: var(--text);
    margin-bottom: 28px;
  }
  .quiz-options {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
  .quiz-opt {
    padding: 14px 18px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    font-family: var(--serif);
    font-size: 0.95rem;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    line-height: 1.4;
  }
  .quiz-opt:hover { border-color: var(--accent); background: rgba(232,200,64,0.06); }
  .quiz-opt.correct { border-color: var(--correct); background: rgba(63,185,80,0.12); color: var(--correct); pointer-events: none; }
  .quiz-opt.wrong { border-color: var(--wrong); background: rgba(248,81,73,0.1); color: var(--wrong); pointer-events: none; }
  .quiz-opt.reveal { border-color: var(--correct); background: rgba(63,185,80,0.08); pointer-events: none; }
  .quiz-opt.disabled { pointer-events: none; opacity: 0.4; }

  .quiz-next-btn {
    display: none;
    margin-top: 20px;
    padding: 12px 32px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: var(--sans);
    transition: transform 0.1s;
  }
  .quiz-next-btn:hover { transform: translateY(-1px); }
  .quiz-next-btn.visible { display: inline-block; }

  .quiz-result {
    text-align: center;
    padding: 60px 20px;
    animation: fadeIn 0.4s ease;
  }
  .result-score {
    font-family: var(--serif);
    font-size: 5rem;
    font-weight: 900;
    color: var(--accent);
    line-height: 1;
  }
  .result-label { color: var(--text-muted); font-size: 1rem; margin: 10px 0 30px; }
  .result-sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 30px; }
  .result-retry {
    padding: 12px 32px;
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 8px;
    font-weight: 700;
    font-size: 0.95rem;
    cursor: pointer;
    font-family: var(--sans);
  }

  /* WRONG ONLY FILTER */
  .filter-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
    align-items: center;
    flex-wrap: wrap;
  }
  .filter-label { font-size: 0.78rem; color: var(--text-muted); }
  .filter-chip {
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 0.75rem;
    cursor: pointer;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-muted);
    transition: all 0.2s;
    font-family: var(--sans);
  }
  .filter-chip:hover { border-color: var(--accent2); color: var(--accent2); }
  .filter-chip.active { background: var(--accent2); color: #000; border-color: var(--accent2); font-weight: 600; }
  .filter-chip.wrong-filter.active { background: var(--wrong); border-color: var(--wrong); }

  /* HIDDEN */
  .hidden { display: none !important; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 600px) {
    header { padding: 16px; }
    .main { padding: 20px 16px; }
    .quiz-options { grid-template-columns: 1fr; }
    .card-answer { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    政治経済 単語カード
    <span>5年8組 20番 松永 泰斉</span>
  </div>
  <div class="score-badge" id="globalScore">
    学習済み<br><strong id="masteredCount">0</strong> / <span id="totalCount">0</span>
  </div>
</header>

<div class="tabs-wrapper" id="tabsWrapper"></div>

<div class="main">
  <div id="appRoot"></div>
</div>

<script>
/* ============================================================
   DATA: All 9 tests with questions, answers, wrong flags
   ============================================================ */
const TESTS = [
  {
    id: "070501",
    title: "国家の基礎・領域・法の分類",
    subtitle: "アリストテレス、主権、領海・EEZ、公法・私法",
    items: [

      { q: "領土、領海、領空の総称\n（国家の三要素のひとつ）", a: "領域", note: "国家の三要素：主権・領域・領民（国民）" },
      { q: "『国家論』において主権論を展開した政治思想家\n西暦1530-1596仏", a: "ボダン", note: "フランスの法学者・政治思想家" },
      { q: "領土の定義：※[　]時に海中に没しない陸地", a: "低潮（干潮）", note: "低潮時＝干潮時" },
      { q: "領海の基線となる海岸線の時刻は？", a: "低潮（低潮線）", note: "低潮線から12海里" },
      { q: "領海の範囲：低潮線から周囲[　]海里", a: "12（海里）", note: "国際法上の標準的な領海幅" },
      { q: "領空の範囲：領土・領海の上空約[　]キロメートル以内", a: "約100（km）", note: "カルマンライン（大気圏の目安）" },
      { q: "領海の周囲さらに12海里。沿岸国が通関や検疫に関する法律を適用できる水域", a: "接続水域", note: "領海基線から24海里" },

      { q: "排他的経済水域の英語略称", a: "EEZ", note: "Exclusive Economic Zone" },
      { q: "船舶が他国の領海を安全に通行する権利。測量・軍事行動は不可。領空には存在しない権利", a: "無害通航権", note: "国連海洋法条約で規定" },

      { q: "国民同士の関係や契約に関する法", a: "私法", note: "民法・商法など" },
      { q: "国家が国民の平等を実現するための社会福祉や労働に関する法", a: "社会法", note: "労働基準法・社会保障法など" },
    ]
  },
  {
    id: "070502",
    title: "絶対王政と社会契約論（ホッブズ）",
    subtitle: "絶対王政・王権神授説・社会契約論・ホッブズ",
    wrongNums: [2],
    items: [
      { q: "財政・軍事力において貴族を圧倒した国王が専制政治を行った状態", a: "絶対王政", note: "16〜18世紀のヨーロッパで発達" },
      { q: "国王の権力の源泉を神に求める考え\n※フィルマー『家父長論』（1588-1653英）", a: "王権神授説", note: "★未記入だった問題", wrong: true },

      { q: "国家は、人民が契約を結んだことにより成立したとする説", a: "社会契約論", note: "ホッブズ・ロック・ルソーが代表的論者" },
      { q: "初めて社会契約論を唱えた人物。清教徒革命を批判（絶対王政を擁護）。西暦1588-1679英", a: "ホッブズ", note: "" },

/* ============================================================
   STATE
   ============================================================ */
let currentTest = 0;
let mode = 'flash'; // flash | quiz | wrong
let quizState = null;
let mastered = JSON.parse(localStorage.getItem('pol_mastered') || '{}');

function saveMastered() {
  localStorage.setItem('pol_mastered', JSON.stringify(mastered));
}

function totalCount() {
  return TESTS.reduce((s, t) => s + t.items.length, 0);
}
function masteredCount() {
  return Object.values(mastered).filter(v => v).length;
}

/* ============================================================
   RENDER TABS
   ============================================================ */
function renderTabs() {
  const wrap = document.getElementById('tabsWrapper');
  const tabAll = `<button class="tab ${currentTest === -1 ? 'active' : ''}" data-idx="-1">全テスト</button>`;
  const tabs = TESTS.map((t, i) => {
    const hasWrong = t.wrongNums && t.wrongNums.length > 0;
    return `<button class="tab ${currentTest === i ? 'active' : ''}" data-idx="${i}">
      ${t.id}${hasWrong ? '<span class="wrong-dot"></span>' : ''}
    </button>`;
  }).join('');
  wrap.innerHTML = tabAll + tabs;
  wrap.querySelectorAll('.tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentTest = parseInt(btn.dataset.idx);
      mode = 'flash';
      render();
    });
  });
}

/* ============================================================
   GET CURRENT ITEMS
   ============================================================ */
function getCurrentItems() {
  if (currentTest === -1) {
    return TESTS.flatMap((t, ti) => t.items.map((item, ii) => ({...item, testId: t.id, globalIdx: `${ti}_${ii}`})));
  }
  const t = TESTS[currentTest];
  return t.items.map((item, ii) => ({...item, testId: t.id, globalIdx: `${currentTest}_${ii}`}));
}

function getWrongItems() {
  if (currentTest === -1) {
    return TESTS.flatMap((t, ti) => t.items.filter(item => item.wrong).map((item, ii) => ({...item, testId: t.id, globalIdx: `${ti}_${ii}`})));
  }
  return TESTS[currentTest].items.filter(i => i.wrong).map((item, ii) => ({...item, testId: TESTS[currentTest].id, globalIdx: `${currentTest}_${ii}`}));
}

/* ============================================================
   FLASHCARD RENDER
   ============================================================ */
function renderFlash(items) {
  const flipped = {};
  
  const html = items.map((item, idx) => {
    const key = item.globalIdx || idx;
    const isMastered = mastered[key];
    const isWrong = item.wrong;
    const ansLen = item.a.length;
    const ansClass = ansLen > 15 ? (ansLen > 25 ? 'xsmall' : 'small') : '';
    const qLen = item.q.length;
    const tall = qLen > 60;
    
    return `<div class="flashcard ${tall ? 'tall' : ''}" data-key="${key}" data-idx="${idx}">
      <div class="card-inner">
        <div class="card-face card-front" style="${isMastered ? 'opacity:0.5;' : ''}">
          ${isWrong ? '<span class="wrong-badge">要注意</span>' : ''}
          <div class="card-num">${(idx+1).toString().padStart(2,'0')}</div>
          <div>
            <div class="card-question">${item.q.replace(/\n/g, '<br>')}</div>
            ${item.note && item.note.startsWith('★') ? '' : (item.note ? `<div class="card-hint">${item.note}</div>` : '')}
          </div>
          <div class="card-flip-hint">タップで答え</div>
        </div>
        <div class="card-face card-back">
          <div class="card-answer-wrap">
            <div class="card-answer ${ansClass}">${item.a}</div>
            ${item.note ? `<div class="card-hint" style="color:var(--accent2);margin-top:8px;">${item.note}</div>` : ''}
          </div>
          <div class="card-flip-hint" style="color:var(--accent2)">もう一度</div>
        </div>
      </div>
    </div>`;
  }).join('');

  return html;
}

/* ============================================================
   QUIZ RENDER
   ============================================================ */
function startQuiz(items) {
  const shuffled = [...items].sort(() => Math.random() - 0.5);
  quizState = {
    items: shuffled,
    idx: 0,
    score: 0,
    answered: false
  };
  renderQuizQuestion();
}

function getDistractors(correct, allItems, count=3) {
  const others = allItems.filter(i => i.a !== correct).map(i => i.a);
  const shuffled = others.sort(() => Math.random() - 0.5);
  return shuffled.slice(0, count);
}

function renderQuizQuestion() {
  const root = document.getElementById('quizArea');
  if (!root) return;
  const {items, idx} = quizState;
  
  if (idx >= items.length) {
    const pct = Math.round(quizState.score / items.length * 100);
    root.innerHTML = `<div class="quiz-result">
      <div class="result-score">${pct}<span style="font-size:2rem">%</span></div>
      <div class="result-label">クイズ結果</div>
      <div class="result-sub">${items.length}問中 ${quizState.score}問正解</div>
      <button class="result-retry" onclick="startQuiz(getCurrentItems())">もう一度</button>
    </div>`;
    return;
  }
  
  const item = items[idx];
  const allItems = getCurrentItems();
  const distractors = getDistractors(item.a, allItems, 3);
  const opts = [...distractors, item.a].sort(() => Math.random() - 0.5);
  const pct = Math.round(idx / items.length * 100);
  
  root.innerHTML = `
    <div class="quiz-progress">
      <span>${idx + 1} / ${items.length}</span>
      <div class="progress-bar-wrap"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
      <span>✓ ${quizState.score}</span>
    </div>
    <div class="quiz-card">
      <div class="quiz-q-num">${(idx+1).toString().padStart(2,'0')}</div>
      <div class="quiz-question">${item.q.replace(/\n/g, '<br>')}</div>
      <div class="quiz-options" id="quizOpts">
        ${opts.map(o => `<button class="quiz-opt" data-answer="${o}">${o}</button>`).join('')}
      </div>
      <button class="quiz-next-btn" id="quizNext" onclick="quizNext()">次の問題 →</button>
    </div>`;
  
  root.querySelectorAll('.quiz-opt').forEach(btn => {
    btn.addEventListener('click', function() {
      if (quizState.answered) return;
      quizState.answered = true;
      const chosen = this.dataset.answer;
      const isCorrect = chosen === item.a;
      if (isCorrect) quizState.score++;
      
      root.querySelectorAll('.quiz-opt').forEach(b => {
        if (b.dataset.answer === item.a) b.classList.add('correct');
        else if (b.dataset.answer === chosen && !isCorrect) b.classList.add('wrong');
        else b.classList.add('disabled');
      });
      
      const nextBtn = document.getElementById('quizNext');
      if (nextBtn) nextBtn.classList.add('visible');
    });
  });
}

function quizNext() {
  quizState.idx++;
  quizState.answered = false;
  renderQuizQuestion();
}

/* ============================================================
   MAIN RENDER
   ============================================================ */
function render() {
  renderTabs();
  
  const root = document.getElementById('appRoot');
  const test = currentTest >= 0 ? TESTS[currentTest] : null;
  const title = test ? test.title : '全テスト一覧';
  const subtitle = test ? test.subtitle : `全${TESTS.length}テスト・${totalCount()}問`;
  const wrongItems = getWrongItems();
  const items = getCurrentItems();
  
  document.getElementById('masteredCount').textContent = masteredCount();
  document.getElementById('totalCount').textContent = totalCount();
  
  const wrongCountBadge = wrongItems.length > 0 
    ? `<span class="wrong-count">要注意 ${wrongItems.length}問</span>` : '';
  
  root.innerHTML = `
    <div class="section-header">
      <div class="section-title">${title}${wrongCountBadge}</div>
      <div class="section-meta">${subtitle}</div>
    </div>
    <div class="mode-bar">
      <button class="mode-btn ${mode==='flash'?'active':''}" onclick="setMode('flash')">📇 単語カード</button>
      <button class="mode-btn ${mode==='quiz'?'active':''}" onclick="setMode('quiz')">🎯 クイズ</button>
      ${wrongItems.length > 0 ? `<button class="mode-btn ${mode==='wrong'?'active danger':''}" onclick="setMode('wrong')">⚠️ 要注意問題のみ</button>` : ''}
      <button class="mode-btn" onclick="resetMastered()" style="margin-left:auto">🔄 リセット</button>
    </div>
    
    ${mode === 'flash' ? `
      <div class="filter-bar">
        <span class="filter-label">フィルター：</span>
        <button class="filter-chip active" id="filterAll" onclick="filterCards('all')">全て（${items.length}）</button>
        <button class="filter-chip" id="filterUn" onclick="filterCards('unlearned')">未習得</button>
        <button class="filter-chip" id="filterDone" onclick="filterCards('learned')">習得済み</button>
      </div>
      <div class="cards-grid" id="cardsGrid">
        ${renderFlash(items)}
      </div>
    ` : mode === 'quiz' ? `
      <div id="quizArea"></div>
    ` : `
      <div style="margin-bottom:16px;padding:14px 18px;background:rgba(248,81,73,0.08);border:1px solid rgba(248,81,73,0.3);border-radius:10px;font-size:0.85rem;color:var(--wrong);">
        ⚠️ <strong>要注意問題</strong>：未記入・誤答だった問題をまとめました。重点的に練習しましょう。
      </div>
      <div class="cards-grid" id="cardsGrid">
        ${renderFlash(wrongItems)}
      </div>
    `}
  `;
  
  if (mode === 'quiz') {
    startQuiz(items);
  }
  
  // Attach flashcard click events
  if (mode === 'flash' || mode === 'wrong') {
    document.querySelectorAll('.flashcard').forEach(card => {
      card.addEventListener('click', function() {
        this.classList.toggle('flipped');
        const key = this.dataset.key;
        if (this.classList.contains('flipped')) {
          mastered[key] = true;
          saveMastered();
          document.getElementById('masteredCount').textContent = masteredCount();
        }
      });
    });
  }
}

function setMode(m) {
  mode = m;
  render();
}

function filterCards(type) {
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  const items = getCurrentItems();
  
  document.querySelectorAll('.flashcard').forEach(card => {
    const key = card.dataset.key;
    if (type === 'all') card.style.display = '';
    else if (type === 'learned') card.style.display = mastered[key] ? '' : 'none';
    else if (type === 'unlearned') card.style.display = (!mastered[key]) ? '' : 'none';
  });
  
  const map = { all: '#filterAll', unlearned: '#filterUn', learned: '#filterDone' };
  const el = document.querySelector(map[type]);
  if (el) el.classList.add('active');
}

function resetMastered() {
  if (confirm('習得済みの記録をリセットしますか？')) {
    mastered = {};
    saveMastered();
    render();
  }
}

/* ============================================================
   INIT
   ============================================================ */
render();
</script>
</body>
</html>
